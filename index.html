<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>借事抒情：自定義教學盤</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --danger: #ff7675; --success: #27ae60; --teacher: #f1c40f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; }
        
        /* 固定在右上角的教師按鈕 */
        .admin-toggle { 
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: var(--teacher); color: #333; border: 2px solid #d4ac0d;
            padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .container { max-width: 900px; margin: 50px auto auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 教師面板 */
        #teacherPanel { display: none; background: #fffde7; border: 3px dashed var(--teacher); padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .edit-area { width: 95%; height: 100px; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; }

        /* 情境詞庫選擇 */
        .scen-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .scen-btn { padding: 8px 15px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 50px; cursor: pointer; font-size: 0.9rem; }
        .scen-btn.active { background: var(--primary); color: white; }

        /* 新增詞語區 */
        .add-section { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        #customWord { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 15px; border: 2px dashed #cbd5e0; border-radius: 12px; margin-bottom: 20px; background: #fff; }
        .word-item { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: #6c5ce7; color: white; border-radius: 20px; cursor: grab; }
        .word-del { background: rgba(255,255,255,0.3); border: none; color: white; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        /* ✨ 左右按鈕切換句型區 */
        .sentence-container { position: relative; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .nav-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .sentence-box { flex: 1; font-size: 1.5rem; line-height: 2.8; padding: 30px; border: 3px solid #e3f2fd; border-radius: 15px; background: #fafafa; min-height: 100px; text-align: center; }
        
        .drop-zone { display: inline-flex; align-items: center; justify-content: center; min-width: 120px; height: 42px; border: 2px dashed #bdc3c7; border-radius: 8px; margin: 0 5px; vertical-align: middle; color: #bbb; font-size: 1rem; cursor: pointer; background: white; }
        .drop-zone.filled { border: 2px solid var(--success); color: #2980b9; font-weight: bold; font-size: 1.3rem; padding: 0 10px; min-width: auto; background: white; }
        
        .upload-btn { display: block; width: 250px; margin: 20px auto; padding: 15px; background: var(--success); color: white; border: none; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .message-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .msg { padding: 20px; border-radius: 15px; background: #fff; box-shadow: 3px 3px 12px rgba(0,0,0,0.06); position: relative; }
        .msg-del { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; background: var(--danger); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<button class="admin-toggle" onclick="toggleAdmin()">⚙️ 教師後台</button>

<div class="container">
    <h1 style="text-align:center; color: var(--primary);">🖋️ 「借事抒情」寫作盤</h1>
    
    <div id="teacherPanel">
        <h3>🛠️ 自訂句型庫</h3>
        <p>每一行代表一個句型，請用 [引導語] 格式：</p>
        <textarea id="sentenceListInput" class="edit-area"></textarea>
        <div style="text-align:right; margin-top:10px;">
            <button onclick="saveSentences()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">儲存句型列表</button>
        </div>
    </div>

    <div class="scen-selector">
        <button class="scen-btn active" id="btn-reminisce" onclick="changeWordBank('reminisce')">🍂 懷舊詞庫</button>
        <button class="scen-btn" id="btn-happy" onclick="changeWordBank('happy')">☀️ 快樂詞庫</button>
        <button class="scen-btn" id="btn-sad" onclick="changeWordBank('sad')">💧 挫折詞庫</button>
    </div>

    <div class="add-section">
        <input type="text" id="customWord" placeholder="輸入新詞語...">
        <button class="add-btn" onclick="addWord()">新增詞語</button>
    </div>

    <div class="word-bank" id="wordBank" ondragover="event.preventDefault()"></div>

    <div class="sentence-container">
        <button class="nav-btn" onclick="navSentence(-1)">❮</button>
        <div class="sentence-box" id="sentenceArea"></div>
        <button class="nav-btn" onclick="navSentence(1)">❯</button>
    </div>
    <div style="text-align:center; color:#999; font-size:0.8rem; margin-bottom:10px;">（點擊左右按鈕更換練習句型）</div>

    <button class="upload-btn" onclick="upload()">🚀 分享我的作品</button>
    <div class="message-board" id="board"></div>
</div>

<script>
    // 詞庫資料
    const wordConfigs = {
        reminisce: ["舊照片", "泛黃", "外公", "操場角落", "那把雨傘", "粗糙", "布滿灰塵"],
        happy: ["閃閃發亮", "熱鬧非凡", "最好的玩伴", "大聲歡笑", "冰淇淋", "公園", "笑咪咪"],
        sad: ["斷了線的風箏", "細雨綿綿", "吞了一顆酸梅", "獨自一人", "沉重", "昏暗", "烏雲密佈"]
    };

    // 句型庫（獨立切換）
    let sentenceTemplates = [
        "看著那 [物件]，我彷彿回到了那個 [場景] 的午後。",
        "記得那天在 [地點]，我和 [人物] 一起 [動作]，那是我最難忘的回憶。",
        "手裡拿著 [物件]，窗外正下著 [天氣]，我的心情感覺 [形容詞]。",
        "這件 [東西] 對我來說意義重大，因為它讓我想起 [往事]。"
    ];

    let currentSentenceIdx = 0;

    // 切換詞庫
    function changeWordBank(type) {
        document.querySelectorAll('.scen-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${type}`));
        const bank = document.getElementById('wordBank');
        bank.innerHTML = "";
        wordConfigs[type].forEach(w => createWordItem(w));
    }

    function createWordItem(text) {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.draggable = true;
        div.innerHTML = `${text} <button class="word-del" onclick="this.parentElement.remove()">✕</button>`;
        div.ondragstart = (e) => e.dataTransfer.setData('text', text);
        document.getElementById('wordBank').appendChild(div);
    }

    function addWord() {
        const input = document.getElementById('customWord');
        if(input.value.trim()) { createWordItem(input.value.trim()); input.value = ""; }
    }

    // 句型切換邏輯
    function navSentence(dir) {
        currentSentenceIdx = (currentSentenceIdx + dir + sentenceTemplates.length) % sentenceTemplates.length;
        renderSentence();
    }

    function renderSentence() {
        const area = document.getElementById('sentenceArea');
        const temp = sentenceTemplates[currentSentenceIdx];
        area.innerHTML = temp.replace(/\[(.*?)\]/g, (m, p1) => 
            `<span class="drop-zone" data-guide="${p1}" ondrop="drop(event)" ondragover="event.preventDefault()" onclick="manual(this)">${p1}</span>`
        );
    }

    // 拖放與手動輸入
    function drop(e) {
        e.preventDefault();
        const txt = e.dataTransfer.getData('text');
        if(e.target.classList.contains('drop-zone')) { e.target.innerText = txt; e.target.classList.add('filled'); }
    }

    function manual(el) {
        const txt = prompt(`請輸入 ${el.dataset.guide}:`);
        if(txt) { el.innerText = txt; el.classList.add('filled'); }
    }

    function upload() {
        if([...document.querySelectorAll('.drop-zone')].some(z => !z.classList.contains('filled'))) { alert("填完再分享喔！"); return; }
        const div = document.createElement('div');
        div.className = `msg bg-${Math.floor(Math.random()*3)}`;
        div.innerHTML = `<button class="msg-del" onclick="this.parentElement.remove()">✕</button><strong>同學作品：</strong><br><br>${document.getElementById('sentenceArea').innerText}`;
        document.getElementById('board').prepend(div);
        renderSentence(); // 分享後清空空格
    }

    // 教師後台邏輯
    function toggleAdmin() {
        const p = document.getElementById('teacherPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
        if(p.style.display === 'block') {
            document.getElementById('sentenceListInput').value = sentenceTemplates.join('\n');
        }
    }

    function saveSentences() {
        const input = document.getElementById('sentenceListInput').value;
        sentenceTemplates = input.split('\n').filter(s => s.trim() !== "");
        currentSentenceIdx = 0;
        renderSentence();
        alert("句型列表儲存成功！");
        toggleAdmin();
    }

    window.onload = () => {
        changeWordBank('reminisce');
        renderSentence();
    };
</script>
</body>
</html>
