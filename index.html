<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>借事抒情：全自訂教學系統</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; --danger: #ff7675; --success: #27ae60; --teacher: #f1c40f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #333; }
        
        .admin-toggle { position: fixed; top: 20px; right: 20px; z-index: 9999; background: var(--teacher); border: 2px solid #d4ac0d; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .container { max-width: 900px; margin: 60px auto auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 教師後台樣式優化 */
        #teacherPanel { display: none; background: #fffde7; border: 3px dashed var(--teacher); padding: 25px; border-radius: 15px; margin-bottom: 25px; }
        .config-section { margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .edit-label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .edit-input { width: 98%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }
        .edit-area { width: 98%; height: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }

        /* 前台樣式 */
        .scen-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .scen-btn { padding: 10px 20px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 50px; cursor: pointer; font-weight: bold; }
        .scen-btn.active { background: var(--primary); color: white; }

        .add-section { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 10px; }
        #customWord { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 15px; border: 2px dashed #cbd5e0; border-radius: 12px; margin-bottom: 20px; background: #fff; }
        .word-item { display: flex; align-items: center; gap: 8px; padding: 8px 15px; background: #6c5ce7; color: white; border-radius: 20px; cursor: grab; }
        .word-del { background: rgba(255,255,255,0.3); border: none; color: white; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        .sentence-container { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .nav-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; flex-shrink: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .sentence-box { flex: 1; font-size: 1.5rem; line-height: 2.8; padding: 30px; border: 3px solid #e3f2fd; border-radius: 15px; background: #fafafa; min-height: 100px; text-align: center; }
        
        .drop-zone { display: inline-flex; align-items: center; justify-content: center; min-width: 120px; height: 42px; border: 2px dashed #bdc3c7; border-radius: 8px; margin: 0 5px; vertical-align: middle; color: #bbb; font-size: 1rem; cursor: pointer; background: white; }
        .drop-zone.filled { border: 2px solid var(--success); color: #2980b9; font-weight: bold; font-size: 1.3rem; padding: 0 10px; min-width: auto; }
        
        .upload-btn { display: block; width: 250px; margin: 20px auto; padding: 15px; background: var(--success); color: white; border: none; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        .message-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .msg { padding: 20px; border-radius: 15px; background: #fff; box-shadow: 3px 3px 12px rgba(0,0,0,0.06); position: relative; }
        .msg-del { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: var(--danger); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<button class="admin-toggle" id="toggleBtn" onclick="toggleAdmin()">⚙️ 開啟教師設定</button>

<div class="container">
    <h1 style="text-align:center; color: var(--primary);">🖋️ 「借事抒情」寫作盤</h1>
    
    <div id="teacherPanel">
        <h3 style="margin-top:0;">🛠️ 全系統自訂後台</h3>
        
        <div class="config-section">
            <span class="edit-label">1. 自訂句型庫（每一行一個句型）：</span>
            <textarea id="editSentences" class="edit-area"></textarea>
        </div>

        <div class="config-section">
            <span class="edit-label">2. 自訂情境分頁（名稱 & 詞庫）：</span>
            <div id="scenEditor">
                </div>
        </div>

        <div style="text-align:right;">
            <button onclick="saveAllConfigs()" style="background:var(--success); color:white; border:none; padding:12px 30px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem;">儲存所有設定並更新</button>
        </div>
    </div>

    <div class="scen-selector" id="scenBtnContainer"></div>

    <div class="add-section">
        <input type="text" id="customWord" placeholder="學生自訂新詞語...">
        <button class="add-btn" onclick="addWord()">新增</button>
    </div>

    <div class="word-bank" id="wordBank" ondragover="event.preventDefault()"></div>

    <div class="sentence-container">
        <button class="nav-btn" onclick="navSentence(-1)">❮</button>
        <div class="sentence-box" id="sentenceArea"></div>
        <button class="nav-btn" onclick="navSentence(1)">❯</button>
    </div>

    <button class="upload-btn" onclick="upload()">🚀 分享作品至展示牆</button>
    <div class="message-board" id="board"></div>
</div>

<script>
    // 預設資料
    let appData = {
        sentences: [
            "看著那 [物件]，我彷彿回到了那個 [場景] 的午後。",
            "記得那天在 [地點]，我和 [人物] 一起 [動作]，那是我最難忘的回憶。",
            "手裡拿著 [物件]，窗外正下著 [天氣]，我的心情感覺 [形容詞]。"
        ],
        scenarios: [
            { name: "🍂 懷舊", words: ["舊照片", "泛黃", "外公", "操場"] },
            { name: "☀️ 快樂", words: ["閃閃發亮", "熱鬧", "冰淇淋", "公園"] },
            { name: "💧 挫折", words: ["考卷", "細雨", "沉重", "獨自一人"] }
        ]
    };

    let currentScenIdx = 0;
    let currentSentIdx = 0;

    // 初始化與渲染
    function init() {
        renderScenButtons();
        changeWordBank(0);
        renderSentence();
    }

    function renderScenButtons() {
        const container = document.getElementById('scenBtnContainer');
        container.innerHTML = "";
        appData.scenarios.forEach((scen, idx) => {
            const btn = document.createElement('button');
            btn.className = `scen-btn ${idx === currentScenIdx ? 'active' : ''}`;
            btn.innerText = scen.name;
            btn.onclick = () => changeWordBank(idx);
            container.appendChild(btn);
        });
    }

    function changeWordBank(idx) {
        currentScenIdx = idx;
        renderScenButtons();
        const bank = document.getElementById('wordBank');
        bank.innerHTML = "";
        appData.scenarios[idx].words.forEach(w => createWordItem(w));
    }

    function createWordItem(text) {
        const div = document.createElement('div');
        div.className = 'word-item';
        div.draggable = true;
        div.innerHTML = `${text} <button class="word-del" onclick="this.parentElement.remove()">✕</button>`;
        div.ondragstart = (e) => e.dataTransfer.setData('text', text);
        document.getElementById('wordBank').appendChild(div);
    }

    function addWord() {
        const input = document.getElementById('customWord');
        if(input.value.trim()) { createWordItem(input.value.trim()); input.value = ""; }
    }

    function navSentence(dir) {
        currentSentIdx = (currentSentIdx + dir + appData.sentences.length) % appData.sentences.length;
        renderSentence();
    }

    function renderSentence() {
        const area = document.getElementById('sentenceArea');
        const temp = appData.sentences[currentSentIdx];
        area.innerHTML = temp.replace(/\[(.*?)\]/g, (m, p1) => 
            `<span class="drop-zone" data-guide="${p1}" ondrop="drop(event)" ondragover="event.preventDefault()" onclick="manual(this)">${p1}</span>`
        );
    }

    function drop(e) {
        e.preventDefault();
        const txt = e.dataTransfer.getData('text');
        if(e.target.classList.contains('drop-zone')) { e.target.innerText = txt; e.target.classList.add('filled'); }
    }

    function manual(el) {
        const txt = prompt(`請輸入 ${el.dataset.guide}:`);
        if(txt) { el.innerText = txt; el.classList.add('filled'); }
    }

    function upload() {
        if([...document.querySelectorAll('.drop-zone')].some(z => !z.classList.contains('filled'))) { alert("填完再分享喔！"); return; }
        const div = document.createElement('div');
        div.className = `msg bg-${Math.floor(Math.random()*3)}`;
        div.innerHTML = `<button class="msg-del" onclick="this.parentElement.remove()">✕</button><strong>同學作品：</strong><br><br>${document.getElementById('sentenceArea').innerText}`;
        document.getElementById('board').prepend(div);
        renderSentence();
    }

    // 教師後台控制
    function toggleAdmin() {
        const p = document.getElementById('teacherPanel');
        const btn = document.getElementById('toggleBtn');
        const isOpen = p.style.display === 'block';
        
        p.style.display = isOpen ? 'none' : 'block';
        btn.innerText = isOpen ? '⚙️ 開啟教師設定' : '✖ 關閉設定';
        
        if(!isOpen) {
            document.getElementById('editSentences').value = appData.sentences.join('\n');
            const editor = document.getElementById('scenEditor');
            editor.innerHTML = "";
            appData.scenarios.forEach((scen, idx) => {
                editor.innerHTML += `
                    <div style="border-left:4px solid var(--primary); padding-left:10px; margin-bottom:10px;">
                        分頁 ${idx+1} 名稱：<input type="text" id="scenName${idx}" class="edit-input" value="${scen.name}">
                        預設詞語（用逗號隔開）：<input type="text" id="scenWords${idx}" class="edit-input" value="${scen.words.join(',')}">
                    </div>`;
            });
        }
    }

    function saveAllConfigs() {
        // 存句型
        appData.sentences = document.getElementById('editSentences').value.split('\n').filter(s => s.trim());
        
        // 存情境
        for(let i=0; i<3; i++) {
            appData.scenarios[i].name = document.getElementById(`scenName${i}`).value;
            appData.scenarios[i].words = document.getElementById(`scenWords${i}`).value.split(',').filter(w => w.trim());
        }

        currentSentIdx = 0;
        init();
        alert("所有設定已同步更新！");
        toggleAdmin();
    }

    window.onload = init;
</script>
</body>
</html>
